<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <title>待辦清單 — MyAjaxApi</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<nav>
    <a href="/index.html">待辦清單</a>
    <a href="/products.html">商品管理</a>
    <span class="spacer"></span>
    <a href="#" id="logoutBtn">登出</a>
</nav>
<main>
    <h1>待辦清單</h1>
    <form id="addForm">
        <input type="text" name="title" placeholder="新增待辦事項" required />
        <button type="submit" class="btn-primary">新增</button>
    </form>
    <ul id="todoList"></ul>
</main>
<script type="module">
import { api } from '/js/api.js';
import { logout, isLoggedIn } from '/js/auth.js';
import { showToast } from '/js/toast.js';

if (!isLoggedIn()) location.href = '/login.html';

document.getElementById('logoutBtn').addEventListener('click', e => {
    e.preventDefault();
    logout();
});

async function loadTodos() {
    const todos = await api.get('/api/todos');
    const list = document.getElementById('todoList');
    list.innerHTML = todos.map(t => `
        <li class="${t.isDone ? 'done' : ''}" data-id="${t.id}">
            <input type="checkbox" ${t.isDone ? 'checked' : ''} />
            <span>${t.title}</span>
            <button class="btn-danger btn-delete">✕</button>
        </li>
    `).join('');
}

document.getElementById('addForm').addEventListener('submit', async e => {
    e.preventDefault();
    const title = e.target.title.value.trim();
    if (!title) return;
    try {
        await api.post('/api/todos', { title });
        e.target.reset();
        await loadTodos();
    } catch (err) {
        showToast(err.message, 'error');
    }
});

document.getElementById('todoList').addEventListener('change', async e => {
    if (e.target.type !== 'checkbox') return;
    const id = Number(e.target.closest('li').dataset.id);
    try {
        await api.patch(`/api/todos/${id}`, { isDone: e.target.checked });
        await loadTodos();
    } catch (err) {
        showToast(err.message, 'error');
    }
});

document.getElementById('todoList').addEventListener('click', async e => {
    if (!e.target.classList.contains('btn-delete')) return;
    const li = e.target.closest('li');
    const id = Number(li.dataset.id);

    // Optimistic UI
    li.remove();
    try {
        await api.delete(`/api/todos/${id}`);
    } catch {
        await loadTodos();
        showToast('刪除失敗', 'error');
    }
});

loadTodos();
</script>
</body>
</html>
